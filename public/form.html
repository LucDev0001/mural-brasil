<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Enviar contribuição</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="./assets/css/style.css" />
  </head>
  <body class="bg-slate-950 text-slate-100 min-h-screen">
    <main class="max-w-3xl mx-auto px-4 py-10">
      <div
        class="rounded-3xl border border-white/10 bg-white/5 p-6 md:p-8 backdrop-blur"
      >
        <div class="flex items-center justify-between gap-4">
          <div>
            <p class="text-emerald-300 text-sm">Envio público</p>
            <h1 class="text-3xl font-black">
              Conte o que acontece na sua cidade
            </h1>
          </div>
          <a
            id="telegramBtn"
            href="#"
            class="rounded-full border border-white/10 px-4 py-2 opacity-50 pointer-events-none"
            >Telegram bloqueado</a
          >
        </div>

        <form id="reportForm" class="mt-8 space-y-4">
          <div class="grid md:grid-cols-2 gap-4">
            <input
              id="nome"
              type="text"
              placeholder="Seu nome"
              class="w-full rounded-2xl bg-slate-900 border border-white/10 px-4 py-3"
            />
            <input
              id="cidade"
              type="text"
              placeholder="Cidade"
              class="w-full rounded-2xl bg-slate-900 border border-white/10 px-4 py-3"
            />
          </div>

          <div class="grid md:grid-cols-2 gap-4">
            <input
              id="estado"
              type="text"
              placeholder="Estado (UF)"
              maxlength="2"
              class="w-full rounded-2xl bg-slate-900 border border-white/10 px-4 py-3 uppercase"
            />
            <select
              id="categoria"
              class="w-full rounded-2xl bg-slate-900 border border-white/10 px-4 py-3"
            >
              <option value="relato">Relato</option>
              <option value="testemunho">Testemunho</option>
              <option value="indignacao">Indignação</option>
              <option value="denuncia_cidada">Denúncia cidadã</option>
            </select>
          </div>

          <input
            id="titulo"
            type="text"
            placeholder="Título do relato"
            class="w-full rounded-2xl bg-slate-900 border border-white/10 px-4 py-3"
          />

          <textarea
            id="mensagem"
            rows="7"
            placeholder="Descreva o que você quer registrar publicamente..."
            class="w-full rounded-2xl bg-slate-900 border border-white/10 px-4 py-3"
          ></textarea>

          <label
            class="flex items-start gap-3 rounded-2xl border border-white/10 bg-slate-900/60 p-4 text-sm"
          >
            <input id="publico" type="checkbox" class="mt-1" />
            <span
              >Estou ciente de que esse conteúdo poderá aparecer publicamente no
              mapa e na listagem.</span
            >
          </label>

          <button
            type="submit"
            class="w-full rounded-2xl bg-emerald-500 px-4 py-3 font-bold text-slate-950"
          >
            Publicar contribuição
          </button>
        </form>

        <p id="feedback" class="mt-4 text-sm text-slate-300"></p>
      </div>
    </main>

    <div
      id="telegramModal"
      class="hidden fixed inset-0 z-[9999] bg-black/80 backdrop-blur-sm"
      aria-labelledby="modal-title"
      role="dialog"
      aria-modal="true"
    >
      <div class="flex min-h-screen items-center justify-center p-4">
        <div
          class="w-full max-w-sm rounded-3xl border border-white/10 bg-slate-900 p-6 shadow-2xl text-center"
        >
          <div
            class="mx-auto mb-4 flex h-16 w-16 items-center justify-center rounded-full bg-emerald-500/20"
          >
            <svg
              class="h-8 w-8 text-emerald-400"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M5 13l4 4L19 7"
              ></path>
            </svg>
          </div>
          <h2 id="modal-title" class="mb-2 text-2xl font-bold text-white">
            Contribuição Enviada!
          </h2>
          <p class="mb-6 text-sm text-slate-300">
            Acompanhe nossas redes sociais e conheça mais sobre o movimento:
          </p>
          <div class="mb-6 flex flex-col gap-3">
            <a
              href="https://t.me/ograndedia"
              target="_blank"
              class="flex items-center justify-center rounded-xl bg-[#2AABEE] py-3 font-bold text-white transition-colors hover:bg-[#229ED9]"
            >
              Telegram
            </a>
            <a
              href="https://instagram.com/geracaozbr.oficial?igsh=Y28wdHczeHV5cDVn"
              target="_blank"
              class="flex items-center justify-center rounded-xl bg-gradient-to-r from-[#833ab4] via-[#fd1d1d] to-[#fcb045] py-3 font-bold text-white transition-opacity hover:opacity-90"
            >
              Instagram
            </a>
            <a
              href="https://www.youtube.com/@ograndediagenzoficial"
              target="_blank"
              class="flex items-center justify-center rounded-xl bg-[#FF0000] py-3 font-bold text-white transition-colors hover:bg-[#CC0000]"
            >
              YouTube
            </a>
            <a
              href="https://hyperzcommunity.com"
              target="_blank"
              class="flex items-center justify-center rounded-xl bg-emerald-500 py-3 font-bold text-slate-950 transition-colors hover:bg-emerald-600"
            >
              Rede Social do Movimento
            </a>
            <a
              href="https://hyperzcommunity.com/transparency/index.php"
              target="_blank"
              class="flex items-center justify-center rounded-xl border border-white/10 bg-white/5 py-3 font-bold text-slate-300 transition-colors hover:bg-white/10"
            >
              Portal de Transparência
            </a>
          </div>
          <button
            id="closeModalBtn"
            type="button"
            class="w-full rounded-xl border border-slate-700 bg-transparent py-3 font-bold text-slate-400 transition-colors hover:bg-slate-800 hover:text-white"
          >
            Fechar e Voltar
          </button>
        </div>
      </div>
    </div>

    <script type="module" src="./assets/js/form.js"></script>
  </body>
</html>
