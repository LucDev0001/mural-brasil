<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Registrar Administrador</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="./assets/css/style.css" />
  </head>
  <body
    class="bg-slate-950 text-slate-100 min-h-screen flex items-center justify-center"
  >
    <main class="max-w-md w-full mx-auto px-4 py-10">
      <div
        class="rounded-3xl border border-white/10 bg-white/5 p-6 md:p-8 backdrop-blur"
      >
        <h1 class="text-3xl font-black text-center">Criar Administrador</h1>
        <p class="mt-2 text-center text-sm text-slate-400">
          Página provisória para criação do primeiro acesso.
        </p>

        <form id="registerForm" class="mt-8 space-y-4">
          <input
            id="email"
            type="email"
            placeholder="Novo e-mail"
            required
            class="w-full rounded-2xl bg-slate-900 border border-white/10 px-4 py-3 outline-none focus:border-emerald-400"
          />
          <input
            id="password"
            type="password"
            placeholder="Nova senha (mínimo 6 caracteres)"
            required
            minlength="6"
            class="w-full rounded-2xl bg-slate-900 border border-white/10 px-4 py-3 outline-none focus:border-emerald-400"
          />
          <button
            type="submit"
            class="w-full rounded-2xl bg-emerald-500 px-4 py-3 font-bold text-slate-950 hover:bg-emerald-400 transition-colors"
          >
            Criar Conta
          </button>
        </form>

        <p id="feedback" class="mt-4 text-sm text-center text-emerald-400"></p>
        <div class="mt-6 text-center">
          <a
            href="./login.html"
            class="text-sm text-slate-400 transition-colors hover:text-white"
            >Voltar para o Login</a
          >
        </div>
      </div>
    </main>

    <script type="module" src="./assets/js/register-temp.js"></script>
  </body>
</html>
